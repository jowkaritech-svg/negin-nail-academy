<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Blush floral fallback background">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7a5962"/>
      <stop offset="0.55" stop-color="#b7848f"/>
      <stop offset="1" stop-color="#f2d7dd"/>
    </linearGradient>
    <radialGradient id="petal" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ffdfe8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffdfe8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="260" cy="180" r="260" fill="url(#petal)"/>
  <circle cx="1320" cy="220" r="240" fill="url(#petal)"/>
  <circle cx="880" cy="640" r="300" fill="url(#petal)"/>
</svg>
