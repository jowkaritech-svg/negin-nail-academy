<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-label="Certificate template">
  <defs>
    <linearGradient id="i" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefc"/>
      <stop offset="1" stop-color="#f5e3e7"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#i)"/>
  <rect x="70" y="60" width="1260" height="780" rx="30" fill="none" stroke="#bf8f99" stroke-width="4"/>
  <rect x="95" y="85" width="1210" height="730" rx="24" fill="none" stroke="#d8b5bd" stroke-width="2"/>
  <text x="700" y="210" text-anchor="middle" fill="#8e5e69" font-size="52" font-family="Georgia">Negin Nail Academy</text>
  <text x="700" y="295" text-anchor="middle" fill="#5f424a" font-size="68" font-family="Georgia">Certificate of Completion</text>
