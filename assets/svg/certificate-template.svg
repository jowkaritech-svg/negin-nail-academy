  <line x1="790" y1="700" x2="1110" y2="700" stroke="#8c606b" stroke-width="2"/>
  <text x="450" y="736" text-anchor="middle" fill="#7a5560" font-size="24" font-family="Verdana">Instructor Signature</text>
  <text x="950" y="736" text-anchor="middle" fill="#7a5560" font-size="24" font-family="Verdana">Date</text>
